name: Dependency Autopilot (reusable)

# Centralized dependency loop, called by a thin stub in each repo.
#
#   Dependabot opens a PR  ->  repo CI runs  ->  this workflow (via the stub's
#   `workflow_run` trigger):
#     * CI green -> TRIAGE: classify risk + label. In `mode: queue` (default) it
#       labels `autopilot:ready` (safe, you click merge) or `autopilot:review`
#       (needs a human). In `mode: automerge` it merges the safe ones.
#     * CI red   -> Codex reads the failed logs and pushes the minimal code fix,
#       which re-triggers CI. (Needs CODEX_AUTH + a push token; skips cleanly
#       where those aren't available, e.g. public repos until the GitHub App.)
#
# WHY queue is the default: auto-merge is only as safe as the CI behind it. Until
# a repo's CI is a *required* gate with real tests, we prepare + label instead of
# merging. Flip a repo to `mode: automerge` once its CI is trustworthy.
#
# SECURITY (callable from PUBLIC repos, so the guards are load-bearing):
#   * Acts only on author == dependabot[bot] (gh: 'app/dependabot') AND
#     isCrossRepository == false. A spoofed `dependabot/*` fork branch is rejected.
#   * Auto-fix checks out with persist-credentials:false, runs Codex network-
#     sandboxed, and refuses to commit lockfile/manifest/workflow edits.
#   * No long-lived secret is needed for triage/merge (default GITHUB_TOKEN).

on:
  workflow_call:
    inputs:
      ci_conclusion:
        description: "Conclusion of the triggering CI run (success|failure|...)"
        required: true
        type: string
      pr_branch:
        description: "head_branch from the workflow_run event"
        required: true
        type: string
      ci_run_id:
        description: "Triggering CI run id (to read failed logs on the fix path)"
        required: true
        type: string
      ecosystem:
        description: "pnpm | npm | pip — selects the auto-fix toolchain"
        required: false
        default: "pnpm"
        type: string
      mode:
        description: "queue (label only, default) | automerge (merge safe bumps)"
        required: false
        default: "queue"
        type: string
    secrets:
      APP_ID:
        required: false
      APP_PRIVATE_KEY:
        required: false
      CODEX_AUTH:
        required: false

jobs:
  # ---------------- TRIAGE (CI green): classify risk, label, optionally merge ----------------
  triage:
    if: ${{ inputs.ci_conclusion == 'success' }}
    runs-on: ubuntu-latest
    permissions:
      contents: write          # merge (automerge mode only)
      pull-requests: write      # labels
      actions: read             # read sibling CI runs
    steps:
      - name: Classify a genuine Dependabot PR and label (merge only in automerge mode)
        env:
          GH_TOKEN: ${{ github.token }}
          BRANCH: ${{ inputs.pr_branch }}
          MODE: ${{ inputs.mode }}
        run: |
          set -euo pipefail
          gh pr list --repo "$GITHUB_REPOSITORY" --head "$BRANCH" --state open \
            --json number,author,isCrossRepository,title > /tmp/prs.json
          num=$(jq -r '.[0].number // empty' /tmp/prs.json)
          [ -n "$num" ] || { echo "No open PR for $BRANCH"; exit 0; }
          author=$(jq -r '.[0].author.login' /tmp/prs.json)
          xrepo=$(jq -r '.[0].isCrossRepository' /tmp/prs.json)
          title=$(jq -r '.[0].title' /tmp/prs.json)
          echo "PR #$num by '$author' (cross-repo=$xrepo): $title"

          # --- HARD GUARDS (critical on public repos) ---
          # gh returns the bot login as 'app/dependabot' on runners — normalize both forms.
          norm="${author#app/}"; norm="${norm%\[bot\]}"
          [ "$norm" = "dependabot" ] || { echo "::notice::author '$author' not dependabot — skip"; exit 0; }
          [ "$xrepo" = "false" ] || { echo "::notice::cross-repository PR — skip"; exit 0; }

          # --- are ALL pull_request CI runs on this commit green? (actions:read) ---
          allgreen=1
          sha=$(gh pr view "$num" --repo "$GITHUB_REPOSITORY" --json headRefOid -q '.headRefOid' 2>/dev/null || echo "")
          if [ -n "$sha" ]; then
            concl=$(gh api "repos/$GITHUB_REPOSITORY/actions/runs?head_sha=$sha&event=pull_request&per_page=100" \
                      -q '[.workflow_runs[] | (.conclusion // "pending")]' 2>/dev/null || echo "[]")
            bad=$(printf '%s' "$concl" | jq -r '[.[] | select(. != "success" and . != "skipped" and . != "neutral")] | length' 2>/dev/null || echo 0)
            [ "${bad:-0}" -gt 0 ] && allgreen=0
          fi

          # --- classify risk tier ---
          tier="review"; reason="unclassified"
          if [[ "$BRANCH" == *"minor-and-patch"* || "$BRANCH" == *"github-actions"* ]]; then
            tier="safe"; reason="grouped minor/patch"
          elif [[ "$title" =~ from\ ([0-9]+)\.([0-9]+)\.[0-9]+.*to\ ([0-9]+)\.([0-9]+)\.[0-9]+ ]]; then
            fM="${BASH_REMATCH[1]}"; fm="${BASH_REMATCH[2]}"; tM="${BASH_REMATCH[3]}"; tm="${BASH_REMATCH[4]}"
            if [ "$fM" != "$tM" ]; then
              tier="review"; reason="major bump ${fM}.x -> ${tM}.x"
            elif [ "$fM" = "0" ] && [ "$fm" != "$tm" ]; then
              tier="review"; reason="0.x minor (${fM}.${fm} -> ${tM}.${tm}) — semver allows breaking"
            else
              tier="safe"; reason="single non-major bump"
            fi
          fi
          if [ "$allgreen" != "1" ]; then tier="review"; reason="${reason}; not all CI green"; fi
          echo "tier=$tier reason=$reason allgreen=$allgreen mode=$MODE"

          # --- ensure labels exist (idempotent) ---
          gh label create "autopilot:ready"  --repo "$GITHUB_REPOSITORY" --color 0e8a16 --description "Autopilot: CI green + low risk — safe to merge" 2>/dev/null || true
          gh label create "autopilot:review" --repo "$GITHUB_REPOSITORY" --color fbca04 --description "Autopilot: needs a human look before merge" 2>/dev/null || true

          if [ "$tier" = "safe" ]; then
            gh pr edit "$num" --repo "$GITHUB_REPOSITORY" --add-label "autopilot:ready" --remove-label "autopilot:review" 2>/dev/null || true
            if [ "$MODE" = "automerge" ]; then
              echo "mode=automerge + safe -> merging."
              gh pr merge "$num" --repo "$GITHUB_REPOSITORY" --squash
            else
              echo "::notice::queue mode — #$num is READY ($reason). Labeled autopilot:ready; merge when you're comfortable."
            fi
          else
            gh pr edit "$num" --repo "$GITHUB_REPOSITORY" --add-label "autopilot:review" --remove-label "autopilot:ready" 2>/dev/null || true
            echo "::notice::#$num needs review ($reason). Labeled autopilot:review."
          fi

  # ---------------- AUTO-FIX (CI red) — needs Codex creds + push token ----------------
  autofix:
    if: ${{ inputs.ci_conclusion == 'failure' }}
    runs-on: ubuntu-latest
    timeout-minutes: 30
    # One fix attempt per PR branch at a time — a second CI failure won't race a
    # fix already in flight (don't cancel: let the running fix finish + push).
    concurrency:
      group: autopilot-autofix-${{ github.repository }}-${{ inputs.pr_branch }}
      cancel-in-progress: false
    permissions:
      contents: read
      pull-requests: read
      actions: read
    steps:
      - name: Preconditions (skip cleanly if creds not inherited)
        id: pre
        env:
          CODEX_AUTH: ${{ secrets.CODEX_AUTH }}
          APP_ID: ${{ secrets.APP_ID }}
          APP_PRIVATE_KEY: ${{ secrets.APP_PRIVATE_KEY }}
        run: |
          set -euo pipefail
          if [ -z "${CODEX_AUTH:-}" ] || [ -z "${APP_ID:-}" ] || [ -z "${APP_PRIVATE_KEY:-}" ]; then
            echo "::notice::Auto-fix needs CODEX_AUTH + the GitHub App creds (APP_ID/APP_PRIVATE_KEY), not available here (e.g. public repo / secrets not inherited)."
            echo "ok=0" >> "$GITHUB_OUTPUT"
          else
            echo "ok=1" >> "$GITHUB_OUTPUT"
          fi

      - name: Validate target PR (dependabot, same-repo, base=main)
        if: steps.pre.outputs.ok == '1'
        env:
          GH_TOKEN: ${{ github.token }}
          BRANCH: ${{ inputs.pr_branch }}
        run: |
          set -euo pipefail
          gh pr list --repo "$GITHUB_REPOSITORY" --head "$BRANCH" --state open \
            --json number,author,baseRefName,isCrossRepository > /tmp/pr.json
          node <<'NODE'
          const fs=require('fs');
          const pr=(JSON.parse(fs.readFileSync('/tmp/pr.json','utf8')))[0];
          if(!pr){ console.log('no open PR'); process.exit(1); }
          const author=pr.author&&pr.author.login;
          const norm=(author||'').replace(/^app\//,'').replace(/\[bot\]$/,'').toLowerCase();
          if(norm!=='dependabot') throw new Error('author not dependabot: '+author);
          if(pr.isCrossRepository) throw new Error('cross-repository PR not allowed');
          if(pr.baseRefName!=='main') throw new Error('base must be main, got '+pr.baseRefName);
          console.log('validated dependency PR #'+pr.number);
          NODE

      - name: Checkout PR branch (no persisted creds)
        if: steps.pre.outputs.ok == '1'
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          ref: ${{ inputs.pr_branch }}
          fetch-depth: 0
          persist-credentials: false

      - name: Setup pnpm
        if: ${{ steps.pre.outputs.ok == '1' && inputs.ecosystem == 'pnpm' }}
        uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1 # v4.3.0
      - name: Setup Node
        if: ${{ steps.pre.outputs.ok == '1' && (inputs.ecosystem == 'pnpm' || inputs.ecosystem == 'npm') }}
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: lts/*
      - name: Setup uv (Python)
        if: ${{ steps.pre.outputs.ok == '1' && inputs.ecosystem == 'pip' }}
        uses: astral-sh/setup-uv@d4b2f3b6ecc6e67c4457f6d3e41ec42d3d0fcb86 # v5

      - name: Install Codex CLI (pinned)
        if: steps.pre.outputs.ok == '1'
        run: |
          npm install -g @openai/codex@0.142.4
          codex --version

      - name: Restore Codex subscription auth
        if: steps.pre.outputs.ok == '1'
        env:
          CODEX_AUTH: ${{ secrets.CODEX_AUTH }}
        run: |
          set -euo pipefail
          mkdir -p "$HOME/.codex"
          printf '%s' "$CODEX_AUTH" > "$HOME/.codex/auth.json"
          chmod 600 "$HOME/.codex/auth.json"

      - name: Codex — fix from the failed CI logs
        if: steps.pre.outputs.ok == '1'
        id: codex
        env:
          GH_TOKEN: ${{ github.token }}
          RUN_ID: ${{ inputs.ci_run_id }}
        run: |
          set +e
          gh run view "$RUN_ID" --repo "$GITHUB_REPOSITORY" --log-failed > /tmp/fail.log 2>/dev/null
          if [ ! -s /tmp/fail.log ]; then echo "::error::no failed logs for run $RUN_ID"; exit 1; fi
          echo "Fetched $(wc -l < /tmp/fail.log) lines of failed CI logs."
          gh run view "$RUN_ID" --repo "$GITHUB_REPOSITORY" --log-failed \
            | codex exec \
                --sandbox workspace-write \
                --skip-git-repo-check \
                -c model_provider=openai \
                -o /tmp/codex-last.txt \
                "The failed CI logs for this dependency-update PR are on stdin. You ARE in the checked-out repo working tree — read and edit the source files directly. Make the MINIMAL application-code changes needed for compatibility with the new dependency versions so the build and tests pass. Do NOT change dependency versions, lockfiles, package.json/pyproject.toml, or workflow files. Do NOT refactor unrelated code. Prefer editing source over running installs. If you genuinely cannot fix it, stop and explain why."
          echo "rc=$?" >> "$GITHUB_OUTPUT"
          echo "----- codex final message -----"
          cat /tmp/codex-last.txt 2>/dev/null || true
          exit 0

      - name: Guard changed files
        if: steps.pre.outputs.ok == '1'
        id: guard
        run: |
          set -euo pipefail
          git diff --name-only > /tmp/changed.txt
          echo "Changed files:"; cat /tmp/changed.txt
          if [ ! -s /tmp/changed.txt ]; then
            echo "::notice::Codex produced no changes (nothing to fix, or it declined)."
            echo "changed=0" >> "$GITHUB_OUTPUT"; exit 0
          fi
          if grep -E '(^|/)(pnpm-lock\.yaml|package-lock\.json|yarn\.lock|bun\.lock|package\.json|pyproject\.toml|uv\.lock|poetry\.lock)$|^\.github/workflows/' /tmp/changed.txt; then
            echo "::error::Codex touched dependency/lockfile/workflow files — refusing to auto-commit."
            exit 1
          fi
          echo "changed=1" >> "$GITHUB_OUTPUT"

      - name: Mint a short-lived GitHub App token (scoped to this repo)
        if: ${{ steps.pre.outputs.ok == '1' && steps.guard.outputs.changed == '1' }}
        id: app
        uses: actions/create-github-app-token@fee1f7d63c2ff003460e3d139729b119787bc349 # v2.2.2
        with:
          app-id: ${{ secrets.APP_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}

      - name: Commit + push the fix (re-triggers CI)
        if: ${{ steps.pre.outputs.ok == '1' && steps.guard.outputs.changed == '1' }}
        env:
          PUSH_TOKEN: ${{ steps.app.outputs.token }}
        run: |
          set -euo pipefail
          git config user.name "codex-autofix"
          git config user.email "codex-autofix@users.noreply.github.com"
          git add -A
          git commit -m "fix(deps): Codex auto-fix for dependency breakage"
          git push "https://x-access-token:${PUSH_TOKEN}@github.com/${GITHUB_REPOSITORY}.git" "HEAD:${{ inputs.pr_branch }}"
          echo "::notice::Pushed via short-lived GitHub App token — CI will re-run to validate the fix."

      - name: Flag the PR as AI-authored (review before merge)
        if: ${{ steps.pre.outputs.ok == '1' && steps.guard.outputs.changed == '1' }}
        env:
          GH_TOKEN: ${{ steps.app.outputs.token }}
          BRANCH: ${{ inputs.pr_branch }}
        run: |
          set -euo pipefail
          # This PR now contains AI-written fix code — flag it so a human runs the
          # deep review gate (/ce-code-review, /pro-gate) before merging.
          gh label create "autopilot:autofixed" --repo "$GITHUB_REPOSITORY" \
            --color d93f0b --description "Autopilot: contains AI-authored fix code — review before merge" 2>/dev/null || true
          num="$(gh pr list --repo "$GITHUB_REPOSITORY" --head "$BRANCH" --state open --json number -q '.[0].number')"
          [ -n "$num" ] && gh pr edit "$num" --repo "$GITHUB_REPOSITORY" --add-label "autopilot:autofixed" || true
