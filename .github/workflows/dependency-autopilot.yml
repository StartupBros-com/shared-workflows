name: Dependency Autopilot (reusable)

# Centralized dependency loop, called by a thin stub in each repo.
#
#   Dependabot opens a PR  ->  repo CI runs  ->  this workflow (via the stub's
#   `workflow_run` trigger):
#     * CI green -> TRIAGE: classify risk + label. In `mode: queue` (default) it
#       labels `autopilot:ready` (safe, you click merge) or `autopilot:review`
#       (needs a human). In `mode: automerge` it merges the safe ones.
#     * CI red   -> Codex reads the failed logs and pushes the minimal code fix,
#       which re-triggers CI. (Needs CODEX_AUTH + a push token; skips cleanly
#       where those aren't available, e.g. public repos until the GitHub App.)
#
# WHY queue is the default: auto-merge is only as safe as the CI behind it. Until
# a repo's CI is a *required* gate with real tests, we prepare + label instead of
# merging. Flip a repo to `mode: automerge` once its CI is trustworthy.
#
# SECURITY (callable from PUBLIC repos, so the guards are load-bearing):
#   * Acts only on author == dependabot[bot] (gh: 'app/dependabot') AND
#     isCrossRepository == false. A spoofed `dependabot/*` fork branch is rejected.
#   * Auto-fix checks out with persist-credentials:false, runs Codex network-
#     sandboxed, and refuses to commit lockfile/manifest/workflow edits.
#   * No long-lived secret is needed for triage/merge (default GITHUB_TOKEN).

on:
  workflow_call:
    inputs:
      ci_conclusion:
        description: "Conclusion of the triggering CI run (success|failure|...)"
        required: true
        type: string
      pr_branch:
        description: "head_branch from the workflow_run event"
        required: true
        type: string
      ci_run_id:
        description: "Triggering CI run id (to read failed logs on the fix path)"
        required: true
        type: string
      ecosystem:
        description: "pnpm | npm | pip — selects the auto-fix toolchain"
        required: false
        default: "pnpm"
        type: string
      mode:
        description: "queue (label only, default) | automerge (merge safe bumps)"
        required: false
        default: "queue"
        type: string
    secrets:
      APP_ID:
        required: false
      APP_PRIVATE_KEY:
        required: false
      CODEX_AUTH:
        required: false

jobs:
  # ---------------- TRIAGE (CI green): classify risk, label, optionally merge ----------------
  triage:
    if: ${{ inputs.ci_conclusion == 'success' }}
    runs-on: ubuntu-latest
    permissions:
      contents: write          # merge (automerge mode only)
      pull-requests: write      # labels
      actions: read             # read sibling CI runs
    steps:
      - name: Classify a genuine Dependabot PR and label (merge only in automerge mode)
        env:
          GH_TOKEN: ${{ github.token }}
          BRANCH: ${{ inputs.pr_branch }}
          MODE: ${{ inputs.mode }}
        run: |
          set -euo pipefail
          gh pr list --repo "$GITHUB_REPOSITORY" --head "$BRANCH" --state open \
            --json number,author,isCrossRepository,title,labels > /tmp/prs.json
          num=$(jq -r '.[0].number // empty' /tmp/prs.json)
          [ -n "$num" ] || { echo "No open PR for $BRANCH"; exit 0; }
          author=$(jq -r '.[0].author.login' /tmp/prs.json)
          xrepo=$(jq -r '.[0].isCrossRepository' /tmp/prs.json)
          title=$(jq -r '.[0].title' /tmp/prs.json)
          echo "PR #$num by '$author' (cross-repo=$xrepo): $title"

          # --- HARD GUARDS (critical on public repos) ---
          # gh returns the bot login as 'app/dependabot' on runners — normalize both forms.
          norm="${author#app/}"; norm="${norm%\[bot\]}"
          [ "$norm" = "dependabot" ] || { echo "::notice::author '$author' not dependabot — skip"; exit 0; }
          [ "$xrepo" = "false" ] || { echo "::notice::cross-repository PR — skip"; exit 0; }

          # --- are ALL pull_request CI runs on this commit green? (actions:read) ---
          allgreen=1
          sha=$(gh pr view "$num" --repo "$GITHUB_REPOSITORY" --json headRefOid -q '.headRefOid' 2>/dev/null || echo "")
          if [ -n "$sha" ]; then
            # Take only the LATEST run per workflow (a re-run leaves a stale older
            # run on the same SHA; counting it would wrongly mark green PRs as not-green).
            bad=$(gh api "repos/$GITHUB_REPOSITORY/actions/runs?head_sha=$sha&event=pull_request&per_page=100" \
                    -q '[ .workflow_runs | group_by(.workflow_id) | .[] | max_by(.run_number)
                          | (.conclusion // "pending") ]
                        | map(select(. != "success" and . != "skipped" and . != "neutral")) | length' \
                    2>/dev/null || echo 0)
            [ "${bad:-0}" -gt 0 ] && allgreen=0
          fi

          # --- classify risk tier ---
          tier="review"; reason="unclassified"
          if [[ "$BRANCH" == *"minor-and-patch"* || "$BRANCH" == *"github-actions"* ]]; then
            tier="safe"; reason="grouped minor/patch"
          elif [[ "$title" =~ from\ ([0-9]+)\.([0-9]+)\.[0-9]+.*to\ ([0-9]+)\.([0-9]+)\.[0-9]+ ]]; then
            fM="${BASH_REMATCH[1]}"; fm="${BASH_REMATCH[2]}"; tM="${BASH_REMATCH[3]}"; tm="${BASH_REMATCH[4]}"
            if [ "$fM" != "$tM" ]; then
              tier="review"; reason="major bump ${fM}.x -> ${tM}.x"
            elif [ "$fM" = "0" ] && [ "$fm" != "$tm" ]; then
              tier="review"; reason="0.x minor (${fM}.${fm} -> ${tM}.${tm}) — semver allows breaking"
            else
              tier="safe"; reason="single non-major bump"
            fi
          fi
          if [ "$allgreen" != "1" ]; then tier="review"; reason="${reason}; not all CI green"; fi
          # AI-authored auto-fixes must ALWAYS get a human merge — never automerge them,
          # even if the bump itself looks safe. (The autofix path stamps this label.)
          if jq -e '(.[0].labels // []) | map(.name) | index("autopilot:autofixed")' /tmp/prs.json >/dev/null 2>&1; then
            tier="review"; reason="contains AI-authored auto-fix — human review required"
          fi
          echo "tier=$tier reason=$reason allgreen=$allgreen mode=$MODE"

          # --- ensure labels exist (idempotent) ---
          gh label create "autopilot:ready"  --repo "$GITHUB_REPOSITORY" --color 0e8a16 --description "Autopilot: CI green + low risk — safe to merge" 2>/dev/null || true
          gh label create "autopilot:review" --repo "$GITHUB_REPOSITORY" --color fbca04 --description "Autopilot: needs a human look before merge" 2>/dev/null || true

          if [ "$tier" = "safe" ]; then
            gh pr edit "$num" --repo "$GITHUB_REPOSITORY" --add-label "autopilot:ready" --remove-label "autopilot:review" 2>/dev/null || true
            if [ "$MODE" = "automerge" ]; then
              echo "mode=automerge + safe -> merging."
              gh pr merge "$num" --repo "$GITHUB_REPOSITORY" --squash
            else
              echo "::notice::queue mode — #$num is READY ($reason). Labeled autopilot:ready; merge when you're comfortable."
            fi
          else
            gh pr edit "$num" --repo "$GITHUB_REPOSITORY" --add-label "autopilot:review" --remove-label "autopilot:ready" 2>/dev/null || true
            echo "::notice::#$num needs review ($reason). Labeled autopilot:review."
          fi

  # ---------------- CHANGELOG-RISK GATE (CI green): analyze release notes, score risk ----------------
  changelog:
    if: ${{ inputs.ci_conclusion == 'success' }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write    # comment + label
    steps:
      - name: Fetch changelog, score risk, and comment on the PR
        env:
          GH_TOKEN: ${{ github.token }}
          BRANCH: ${{ inputs.pr_branch }}
          ECOSYSTEM: ${{ inputs.ecosystem }}
        run: |
          set -euo pipefail

          # ── 1. Resolve + guard the PR ───────────────────────────────────────
          gh pr list --repo "$GITHUB_REPOSITORY" --head "$BRANCH" --state open \
            --json number,author,title > /tmp/cl-prs.json
          num=$(jq -r '.[0].number // empty' /tmp/cl-prs.json)
          [ -n "$num" ] || { echo "No open PR for $BRANCH"; exit 0; }
          author=$(jq -r '.[0].author.login' /tmp/cl-prs.json)
          title=$(jq  -r '.[0].title'        /tmp/cl-prs.json)
          norm="${author#app/}"; norm="${norm%\[bot\]}"
          [ "$norm" = "dependabot" ] || { echo "::notice::author '$author' not dependabot — skip"; exit 0; }
          echo "Changelog gate: PR #$num '$title'"

          # ── 2. Parse the bump from the PR title ─────────────────────────────
          # Single-package: "... bump <pkg> from <old> to <new> ..."
          pkg=""; old_ver=""; new_ver=""
          if [[ "$title" =~ [Bb]ump[[:space:]]+([^[:space:]]+)[[:space:]]+from[[:space:]]+([^[:space:]]+)[[:space:]]+to[[:space:]]+([^[:space:]]+) ]]; then
            pkg="${BASH_REMATCH[1]}"
            old_ver="${BASH_REMATCH[2]}"
            new_ver="${BASH_REMATCH[3]}"
          fi

          # Grouped update (no single from/to)
          if [ -z "$pkg" ]; then
            echo "Grouped update — posting informational comment."
            # Build a best-effort compare link if repo is known
            compare_hint="See each package's CHANGELOG or releases page for details."
            gh label create "changelog:grouped" --repo "$GITHUB_REPOSITORY" \
              --color ededed --description "Dependabot grouped update: review packages individually" 2>/dev/null || true
            gh pr edit "$num" --repo "$GITHUB_REPOSITORY" --add-label "changelog:grouped" 2>/dev/null || true
            cat > /tmp/cl-body.md <<'BODY_EOF'
          ## 🔎 Changelog-risk review — grouped update

          This is a grouped Dependabot update with multiple packages bumped at once.
          Automated per-package changelog analysis is skipped in v1 for grouped updates.

          **Action:** Review each bumped package individually via its linked compare URL
          in the PR description, or inspect its releases page on GitHub/npm.

          > _Changelog-risk gate v1 — grouped update pass-through._
          BODY_EOF
            gh pr comment "$num" --repo "$GITHUB_REPOSITORY" --body-file /tmp/cl-body.md 2>/dev/null || true
            exit 0
          fi

          echo "pkg=$pkg  old=$old_ver  new=$new_ver"

          # ── 3. Semver risk signal ────────────────────────────────────────────
          semver_risk="LOW"
          semver_reason="patch/minor bump"
          # Strip leading 'v' from versions
          ov="${old_ver#v}"; nv="${new_ver#v}"
          old_major=$(echo "$ov" | cut -d. -f1)
          old_minor=$(echo "$ov" | cut -d. -f2)
          new_major=$(echo "$nv" | cut -d. -f1)
          new_minor=$(echo "$nv" | cut -d. -f2)
          if [ "$old_major" != "$new_major" ]; then
            semver_risk="HIGH"; semver_reason="MAJOR version bump (${old_major}.x → ${new_major}.x)"
          elif [ "$old_major" = "0" ] && [ "$old_minor" != "$new_minor" ]; then
            semver_risk="HIGH"; semver_reason="0.x MINOR bump (${ov} → ${nv}) — semver allows breaking changes"
          elif [ "$old_minor" != "$new_minor" ]; then
            semver_risk="MEDIUM"; semver_reason="minor bump (${ov} → ${nv})"
          fi

          # ── 4. Fetch changelog/release notes ────────────────────────────────
          gh_owner=""; gh_repo_name=""
          npm_page="https://www.npmjs.com/package/${pkg}"
          compare_url=""
          release_notes=""

          if [[ "$ECOSYSTEM" == "pnpm" || "$ECOSYSTEM" == "npm" ]]; then
            # npm registry: resolve the GitHub repo from .repository.url
            reg_url="https://registry.npmjs.org/${pkg}"
            reg_json=$(curl -sf --max-time 10 "$reg_url" 2>/dev/null || echo "{}")
            repo_url=$(echo "$reg_json" | jq -r '.repository.url // ""' 2>/dev/null || echo "")
            # Normalize: git+https://github.com/owner/repo.git -> owner/repo
            if [[ "$repo_url" =~ github\.com[:/]([^/]+)/([^/.]+)(\.git)?$ ]]; then
              gh_owner="${BASH_REMATCH[1]}"
              gh_repo_name="${BASH_REMATCH[2]}"
            fi
            if [ -n "$gh_owner" ] && [ -n "$gh_repo_name" ]; then
              compare_url="https://github.com/${gh_owner}/${gh_repo_name}/compare/v${old_ver}...v${new_ver}"
              # Fetch GitHub releases (up to 100, then filter for versions in range)
              releases_json=$(gh api "repos/${gh_owner}/${gh_repo_name}/releases?per_page=100" 2>/dev/null || echo "[]")
              # Collect body text from releases whose tag matches versions > old_ver and <= new_ver.
              # We use Python for the semver filtering since bash arithmetic is fragile on semver.
              release_notes=$(python3 - "$old_ver" "$new_ver" "$pkg" <<'PY_EOF' || echo ""
          import sys, json, re

          def parse_ver(v):
              v = v.lstrip('v')
              parts = re.split(r'[.\-]', v)
              nums = []
              for p in parts[:3]:
                  try: nums.append(int(p))
                  except: nums.append(0)
              while len(nums) < 3: nums.append(0)
              return tuple(nums)

          old_v, new_v, pkg = sys.argv[1], sys.argv[2], sys.argv[3]
          old_t, new_t = parse_ver(old_v), parse_ver(new_v)
          pkg_short = pkg.split('/')[-1].lstrip('@')  # last segment of scoped pkg

          try:
              releases = json.load(sys.stdin)
          except Exception:
              releases = []

          bodies = []
          for rel in releases:
              tag = rel.get('tag_name', '')
              body = rel.get('body', '') or ''
              # Match tag formats: v1.2.3, 1.2.3, pkg-name@1.2.3, pkg-name-v1.2.3
              m = re.search(r'(?:^v?|@v?|[-_]v?)(\d+\.\d+[\.\d]*)(?:$|-|\.)', tag)
              if not m: continue
              try:
                  tv = parse_ver(m.group(1))
              except: continue
              if old_t < tv <= new_t:
                  header = f"### Release {tag}"
                  bodies.append(header + "\n" + body[:2000])  # cap each release at 2k chars

          print('\n\n'.join(bodies[:10]))  # cap at 10 releases
          PY_EOF
          )
            fi
            # Fallback compare URL if we couldn't get the GH repo
            if [ -z "$compare_url" ]; then
              compare_url="https://www.npmjs.com/package/${pkg}?activeTab=versions"
            fi

          elif [[ "$ECOSYSTEM" == "pip" ]]; then
            # PyPI: lighter best-effort
            pypi_json=$(curl -sf --max-time 10 "https://pypi.org/pypi/${pkg}/json" 2>/dev/null || echo "{}")
            repo_url=$(echo "$pypi_json" | jq -r '
              (.info.project_urls // {}) |
              to_entries[] | select(.key | test("(?i)source|repository|code|github")) | .value
              ' 2>/dev/null | head -1 || echo "")
            if [[ "$repo_url" =~ github\.com[:/]([^/]+)/([^/.]+)(\.git)?$ ]]; then
              gh_owner="${BASH_REMATCH[1]}"
              gh_repo_name="${BASH_REMATCH[2]}"
            fi
            if [ -n "$gh_owner" ] && [ -n "$gh_repo_name" ]; then
              compare_url="https://github.com/${gh_owner}/${gh_repo_name}/compare/v${old_ver}...v${new_ver}"
              releases_json=$(gh api "repos/${gh_owner}/${gh_repo_name}/releases?per_page=100" 2>/dev/null || echo "[]")
              release_notes=$(python3 - "$old_ver" "$new_ver" "$pkg" <<'PY_EOF' || echo ""
          import sys, json, re

          def parse_ver(v):
              v = v.lstrip('v')
              parts = re.split(r'[.\-]', v)
              nums = []
              for p in parts[:3]:
                  try: nums.append(int(p))
                  except: nums.append(0)
              while len(nums) < 3: nums.append(0)
              return tuple(nums)

          old_v, new_v, pkg = sys.argv[1], sys.argv[2], sys.argv[3]
          old_t, new_t = parse_ver(old_v), parse_ver(new_v)

          try:
              releases = json.load(sys.stdin)
          except Exception:
              releases = []

          bodies = []
          for rel in releases:
              tag = rel.get('tag_name', '')
              body = rel.get('body', '') or ''
              m = re.search(r'(?:^v?|@v?|[-_]v?)(\d+\.\d+[\.\d]*)(?:$|-|\.)', tag)
              if not m: continue
              try:
                  tv = parse_ver(m.group(1))
              except: continue
              if old_t < tv <= new_t:
                  bodies.append(f"### Release {tag}\n" + body[:2000])

          print('\n\n'.join(bodies[:10]))
          PY_EOF
          )
            fi
            if [ -z "$compare_url" ]; then
              compare_url="https://pypi.org/project/${pkg}/#history"
              npm_page="https://pypi.org/project/${pkg}/"
            fi
          fi

          # ── 5. Risk keyword scan ─────────────────────────────────────────────
          RISK_KEYWORDS="BREAKING|breaking change|deprecat|removed|security|CVE-|vulnerab|migration"
          matched_lines=""
          keyword_hit=0
          if [ -n "$release_notes" ]; then
            matched_lines=$(echo "$release_notes" | grep -iE "$RISK_KEYWORDS" | head -8 || true)
            [ -n "$matched_lines" ] && keyword_hit=1
          fi

          # ── 6. Final verdict ─────────────────────────────────────────────────
          verdict="$semver_risk"
          verdict_reason="$semver_reason"
          if [ "$keyword_hit" = "1" ] && [ "$verdict" != "HIGH" ]; then
            verdict="HIGH"; verdict_reason="${semver_reason}; risk keywords found in release notes"
          elif [ "$keyword_hit" = "0" ] && [ "$verdict" = "MEDIUM" ] && [ -n "$release_notes" ]; then
            verdict="MEDIUM"; verdict_reason="${semver_reason}; no risk keywords found"
          elif [ "$keyword_hit" = "0" ] && [ "$verdict" = "LOW" ]; then
            verdict="LOW"; verdict_reason="${semver_reason}; no risk keywords found"
          fi

          echo "verdict=$verdict  reason=$verdict_reason"

          # ── 7. Compose the PR comment ────────────────────────────────────────
          # Choose emoji badge
          badge="🟢 LOW"
          [ "$verdict" = "MEDIUM" ] && badge="🟡 MEDIUM"
          [ "$verdict" = "HIGH"   ] && badge="🔴 HIGH"

          # Format matched risk-keyword lines
          matched_block=""
          if [ -n "$matched_lines" ]; then
            matched_block=$(printf '%s\n' "$matched_lines" | head -8 | sed 's/^/> /')
          fi

          # Build the registry/docs link label
          if [[ "$ECOSYSTEM" == "pip" ]]; then
            pkg_link_label="PyPI page"
          else
            pkg_link_label="npm page"
          fi

          {
            echo "## 🔎 Changelog-risk review — \`${pkg}\` ${old_ver}→${new_ver}"
            echo ""
            echo "**Risk verdict: ${badge}**"
            echo ""
            echo "**Reason:** ${verdict_reason}"
            echo ""
            if [ -n "$matched_lines" ]; then
              echo "**Matched risk signals in release notes:**"
              echo ""
              echo "$matched_block"
              echo ""
            fi
            echo "**Links:**"
            echo "- [${pkg_link_label}](${npm_page})"
            if [ -n "$compare_url" ]; then
              echo "- [Compare ${old_ver}→${new_ver}](${compare_url})"
            fi
            if [ -n "$gh_owner" ] && [ -n "$gh_repo_name" ]; then
              echo "- [GitHub releases](https://github.com/${gh_owner}/${gh_repo_name}/releases)"
            fi
            echo ""
            if [ -z "$release_notes" ]; then
              echo "> _No GitHub release notes found for this version range — assessed from semver heuristic only._"
            else
              echo "> _Scanned $(echo "$release_notes" | wc -l) lines of release notes in range \`${old_ver}\`→\`${new_ver}\`._"
            fi
            echo ""
            echo "> _Changelog-risk gate v1 — heuristic only, no AI dependency._"
          } > /tmp/cl-body.md

          gh pr comment "$num" --repo "$GITHUB_REPOSITORY" --body-file /tmp/cl-body.md 2>/dev/null || true

          # ── 8. Labels ────────────────────────────────────────────────────────
          lv=$(echo "$verdict" | tr '[:upper:]' '[:lower:]')
          label_color="0e8a16"  # green=LOW
          [ "$lv" = "medium" ] && label_color="fbca04"
          [ "$lv" = "high"   ] && label_color="d93f0b"

          gh label create "changelog:low"    --repo "$GITHUB_REPOSITORY" --color 0e8a16 \
            --description "Changelog gate: low-risk version bump"    2>/dev/null || true
          gh label create "changelog:medium" --repo "$GITHUB_REPOSITORY" --color fbca04 \
            --description "Changelog gate: medium-risk version bump" 2>/dev/null || true
          gh label create "changelog:high"   --repo "$GITHUB_REPOSITORY" --color d93f0b \
            --description "Changelog gate: high-risk version bump — needs human review" 2>/dev/null || true

          # Remove all changelog:* labels first (idempotent re-runs), then add the right one
          gh pr edit "$num" --repo "$GITHUB_REPOSITORY" \
            --remove-label "changelog:low" --remove-label "changelog:medium" --remove-label "changelog:high" \
            2>/dev/null || true
          gh pr edit "$num" --repo "$GITHUB_REPOSITORY" --add-label "changelog:${lv}" 2>/dev/null || true

          if [ "$verdict" = "HIGH" ]; then
            gh label create "autopilot:review" --repo "$GITHUB_REPOSITORY" --color fbca04 \
              --description "Autopilot: needs a human look before merge" 2>/dev/null || true
            gh pr edit "$num" --repo "$GITHUB_REPOSITORY" \
              --add-label "autopilot:review" --remove-label "autopilot:ready" 2>/dev/null || true
            echo "::notice::PR #$num flagged HIGH risk — autopilot:review added."
          fi

  # ---------------- AUTO-FIX (CI red) — needs Codex creds + push token ----------------
  autofix:
    if: ${{ inputs.ci_conclusion == 'failure' }}
    runs-on: ubuntu-latest
    timeout-minutes: 30
    # One fix attempt per PR branch at a time — a second CI failure won't race a
    # fix already in flight (don't cancel: let the running fix finish + push).
    concurrency:
      group: autopilot-autofix-${{ github.repository }}-${{ inputs.pr_branch }}
      cancel-in-progress: false
    permissions:
      contents: read
      pull-requests: read
      actions: read
    steps:
      - name: Preconditions — creds, validate the PR, freshness
        id: pre
        env:
          GH_TOKEN: ${{ github.token }}
          CODEX_AUTH: ${{ secrets.CODEX_AUTH }}
          APP_ID: ${{ secrets.APP_ID }}
          APP_PRIVATE_KEY: ${{ secrets.APP_PRIVATE_KEY }}
          BRANCH: ${{ inputs.pr_branch }}
          RUN_ID: ${{ inputs.ci_run_id }}
        run: |
          set -euo pipefail
          skip() { echo "::notice::$1"; echo "ok=0" >> "$GITHUB_OUTPUT"; exit 0; }
          # Need Codex creds + App creds, else this repo can't auto-fix (e.g. public repo).
          if [ -z "${CODEX_AUTH:-}" ] || [ -z "${APP_ID:-}" ] || [ -z "${APP_PRIVATE_KEY:-}" ]; then
            skip "Auto-fix needs CODEX_AUTH + GitHub App creds — not available here; skipping (auto-merge/queue still active)."
          fi
          gh pr list --repo "$GITHUB_REPOSITORY" --head "$BRANCH" --state open \
            --json number,author,baseRefName,isCrossRepository,headRefOid > /tmp/pr.json
          num=$(jq -r '.[0].number // empty' /tmp/pr.json)
          [ -n "$num" ] || skip "no open PR for $BRANCH (closed/merged); skipping."
          author=$(jq -r '.[0].author.login' /tmp/pr.json)
          norm="${author#app/}"; norm="${norm%\[bot\]}"
          xrepo=$(jq -r '.[0].isCrossRepository' /tmp/pr.json)
          base=$(jq -r '.[0].baseRefName' /tmp/pr.json)
          pr_sha=$(jq -r '.[0].headRefOid' /tmp/pr.json)
          # HARD GUARDS — only genuine, same-repo Dependabot PRs (load-bearing on public repos).
          # A guard hit here is anomalous (shouldn't reach autofix), so fail loudly.
          [ "$norm" = "dependabot" ] || { echo "::error::author '$author' is not dependabot"; exit 1; }
          [ "$xrepo" = "false" ]     || { echo "::error::cross-repository PR not allowed"; exit 1; }
          [ "$base" = "main" ]       || { echo "::error::base must be main, got '$base'"; exit 1; }
          # FRESHNESS — the failed run must correspond to the CURRENT PR head; if the branch
          # moved on (rebase / an earlier fix already landed), these logs are stale → skip.
          run_sha=$(gh run view "$RUN_ID" --repo "$GITHUB_REPOSITORY" --json headSha -q '.headSha' 2>/dev/null || echo "")
          if [ -n "$run_sha" ] && [ "$run_sha" != "$pr_sha" ]; then
            skip "stale failure: run $RUN_ID was for $run_sha but PR #$num head is now $pr_sha; skipping."
          fi
          echo "Validated dependency PR #$num (head $pr_sha)."
          { echo "ok=1"; echo "number=$num"; echo "base_sha=$pr_sha"; } >> "$GITHUB_OUTPUT"

      - name: Checkout PR branch (no persisted creds)
        if: steps.pre.outputs.ok == '1'
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          ref: ${{ inputs.pr_branch }}
          fetch-depth: 0
          persist-credentials: false

      - name: Setup pnpm
        if: ${{ steps.pre.outputs.ok == '1' && inputs.ecosystem == 'pnpm' }}
        uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1 # v4.3.0
      - name: Setup Node
        if: ${{ steps.pre.outputs.ok == '1' && (inputs.ecosystem == 'pnpm' || inputs.ecosystem == 'npm') }}
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: lts/*
      - name: Setup uv (Python)
        if: ${{ steps.pre.outputs.ok == '1' && inputs.ecosystem == 'pip' }}
        uses: astral-sh/setup-uv@d4b2f3b6ecc6e67c4457f6d3e41ec42d3d0fcb86 # v5

      - name: Install Codex CLI (pinned)
        if: steps.pre.outputs.ok == '1'
        run: |
          npm install -g @openai/codex@0.142.4
          codex --version

      - name: Restore Codex subscription auth
        if: steps.pre.outputs.ok == '1'
        env:
          CODEX_AUTH: ${{ secrets.CODEX_AUTH }}
        run: |
          set -euo pipefail
          mkdir -p "$HOME/.codex"
          printf '%s' "$CODEX_AUTH" > "$HOME/.codex/auth.json"
          chmod 600 "$HOME/.codex/auth.json"

      - name: Codex — fix from the failed CI logs
        if: steps.pre.outputs.ok == '1'
        id: codex
        env:
          GH_TOKEN: ${{ github.token }}
          RUN_ID: ${{ inputs.ci_run_id }}
        run: |
          set +e
          gh run view "$RUN_ID" --repo "$GITHUB_REPOSITORY" --log-failed > /tmp/fail.log 2>/dev/null
          if [ ! -s /tmp/fail.log ]; then echo "::error::no failed logs for run $RUN_ID"; exit 1; fi
          echo "Fetched $(wc -l < /tmp/fail.log) lines of failed CI logs."
          gh run view "$RUN_ID" --repo "$GITHUB_REPOSITORY" --log-failed \
            | codex exec \
                --sandbox workspace-write \
                --skip-git-repo-check \
                -c model_provider=openai \
                -o /tmp/codex-last.txt \
                "The failed CI logs for this dependency-update PR are on stdin. You ARE in the checked-out repo working tree — read and edit the source files directly. Make the MINIMAL application-code changes needed for compatibility with the new dependency versions so the build and tests pass. Do NOT change dependency versions, lockfiles, package.json/pyproject.toml, or workflow files. Do NOT refactor unrelated code. Prefer editing source over running installs. If you genuinely cannot fix it, stop and explain why."
          echo "rc=$?" >> "$GITHUB_OUTPUT"
          echo "----- codex final message -----"
          cat /tmp/codex-last.txt 2>/dev/null || true
          exit 0

      - name: Guard changed files
        if: steps.pre.outputs.ok == '1'
        id: guard
        run: |
          set -euo pipefail
          git diff --name-only > /tmp/changed.txt
          echo "Changed files:"; cat /tmp/changed.txt
          if [ ! -s /tmp/changed.txt ]; then
            echo "::notice::Codex produced no changes (nothing to fix, or it declined)."
            echo "changed=0" >> "$GITHUB_OUTPUT"; exit 0
          fi
          if grep -E '(^|/)(pnpm-lock\.yaml|package-lock\.json|yarn\.lock|bun\.lock|package\.json|pyproject\.toml|uv\.lock|poetry\.lock)$|^\.github/workflows/' /tmp/changed.txt; then
            echo "::error::Codex touched dependency/lockfile/workflow files — refusing to auto-commit."
            exit 1
          fi
          echo "changed=1" >> "$GITHUB_OUTPUT"

      - name: Mint a short-lived GitHub App token (scoped to this repo)
        if: ${{ steps.pre.outputs.ok == '1' && steps.guard.outputs.changed == '1' }}
        id: app
        uses: actions/create-github-app-token@fee1f7d63c2ff003460e3d139729b119787bc349 # v2.2.2
        with:
          app-id: ${{ secrets.APP_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}

      - name: Commit + push the fix (re-triggers CI)
        if: ${{ steps.pre.outputs.ok == '1' && steps.guard.outputs.changed == '1' }}
        id: push
        env:
          PUSH_TOKEN: ${{ steps.app.outputs.token }}
          BRANCH: ${{ inputs.pr_branch }}
          BASE_SHA: ${{ steps.pre.outputs.base_sha }}
        run: |
          set -euo pipefail
          # Pre-push freshness: if the remote branch advanced since we checked out
          # (a concurrent fix already landed, or a rebase), don't push a fix built on
          # stale code — skip cleanly rather than force a non-fast-forward.
          git fetch -q origin "$BRANCH"
          remote_sha=$(git rev-parse "origin/$BRANCH")
          if [ "$remote_sha" != "$BASE_SHA" ]; then
            echo "::notice::branch advanced ($BASE_SHA -> $remote_sha) since checkout — another fix already landed; skipping push."
            exit 0
          fi
          git config user.name "codex-autofix"
          git config user.email "codex-autofix@users.noreply.github.com"
          git add -A
          git commit -m "fix(deps): Codex auto-fix for dependency breakage"
          # BRANCH via env (never interpolate event data into the shell).
          git push "https://x-access-token:${PUSH_TOKEN}@github.com/${GITHUB_REPOSITORY}.git" "HEAD:$BRANCH"
          echo "pushed=1" >> "$GITHUB_OUTPUT"
          echo "::notice::Pushed via short-lived GitHub App token — CI will re-run to validate the fix."

      - name: Flag the PR as AI-authored (review before merge)
        if: ${{ steps.pre.outputs.ok == '1' && steps.push.outputs.pushed == '1' }}
        env:
          GH_TOKEN: ${{ steps.app.outputs.token }}
          NUM: ${{ steps.pre.outputs.number }}
        run: |
          set -euo pipefail
          # A fix was actually pushed → this PR now contains AI-written code. The label is
          # LOAD-BEARING: triage forces tier=review when it's present, so this PR can never
          # auto-merge. Failing to apply it must fail the job (don't let AI code slip through
          # unflagged). Only the "label already exists" case is ignorable.
          gh label create "autopilot:autofixed" --repo "$GITHUB_REPOSITORY" \
            --color d93f0b --description "Autopilot: contains AI-authored fix code — review before merge" 2>/dev/null || true
          # pro-review opts this PR into the GPT-5.5 Pro Extended gate (pro-review-daemon),
          # so every AI-authored fix is deep-reviewed before a human merges it.
          gh label create "pro-review" --repo "$GITHUB_REPOSITORY" \
            --color 5319e7 --description "GPT-5.5 Pro Extended final gate (pro-review-daemon)" 2>/dev/null || true
          [ -n "$NUM" ] || { echo "::error::no PR number to flag — refusing to leave an AI fix unflagged"; exit 1; }
          gh pr edit "$NUM" --repo "$GITHUB_REPOSITORY" --add-label "autopilot:autofixed" --add-label "pro-review"
